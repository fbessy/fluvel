name: Fluvel Windows Release

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:
  windows:
    runs-on: windows-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Compute version (tag ou commit)
      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION = $VERSION"

      # Setup Qt
      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      # Add Qt to PATH
      - name: Add Qt to PATH
        run: echo "${{ env.Qt6_DIR }}\bin" >> $env:GITHUB_PATH

      # Configure (comme GitLab)
      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DFLUVEL_GIT_COMMIT=${{ github.sha }}
          -DFLUVEL_BUILD_ORIGIN="GitHub Actions"
          -DFLUVEL_VERSION=${{ env.VERSION }}

      # Build
      - name: Build
        run: cmake --build build --config Release

      # Deploy Qt
      - name: Deploy Qt
        run: windeployqt build\Release\Fluvel.exe

      # ZIP (comme AppImage naming)
      - name: Zip package
        run: |
          powershell Compress-Archive -Path build\Release\* -DestinationPath Fluvel-${{ env.VERSION }}-win64.zip

      # Install Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup -y

      # Build installer
      - name: Build installer
        run: iscc installer.iss

      # Rename installer avec version
      - name: Rename installer
        run: |
          ren Output\FluvelSetup.exe Fluvel-${{ env.VERSION }}-setup.exe

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluvel-windows-${{ env.VERSION }}
          path: |
            Fluvel-${{ env.VERSION }}-win64.zip
            Output\Fluvel-${{ env.VERSION }}-setup.exe
