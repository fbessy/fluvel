name: Fluvel Windows Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:
  windows:
    runs-on: windows-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Compute version (tag ou commit)
      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION = $VERSION"

      # Setup Qt
      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      # Clean build dir
      - name: Clean build dir
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue

      # Configure
      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_UNITY_BUILD=OFF
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          -DFLUVEL_GIT_COMMIT=${{ github.sha }}
          -DFLUVEL_BUILD_ORIGIN="GitHub Actions"
          -DFLUVEL_BUILD_VERSION=${{ env.VERSION }}

      # Build
      - name: Build
        run: cmake --build build --config Release

      # Check exe exists
      - name: Check exe
        shell: pwsh
        run: |
          dir build\src\app\Release
          if (!(Test-Path "build\src\app\Release\Fluvel.exe")) {
            Write-Error "Fluvel.exe not found!"
            exit 1
          }

      # Check windeployqt exists
      - name: Check windeployqt
        shell: pwsh
        run: |
          if (!(Test-Path "${{ env.Qt6_DIR }}/bin/windeployqt.exe")) {
            Write-Error "windeployqt not found"
            exit 1
          }

      # Deploy Qt
      - name: Deploy Qt
        shell: pwsh
        run: |
          & "${{ env.Qt6_DIR }}/bin/windeployqt.exe" --release build\src\app\Release\Fluvel.exe

      # Check deployed files
      - name: Check deployed files
        shell: pwsh
        run: |
          dir build\src\app\Release
          if (!(Test-Path "build\src\app\Release\platforms\qwindows.dll")) {
            Write-Error "Missing Qt platform plugin!"
            exit 1
          }

      # ZIP package
      - name: Zip package
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          mkdir package

          # Nettoyage des anciens zip éventuels
          Remove-Item build\src\app\Release\*.zip -ErrorAction SilentlyContinue

          # Copier fichiers essentiels
          Copy-Item build\src\app\Release\Fluvel.exe package\

          # Copier DLL si présentes
          Get-ChildItem build\src\app\Release\*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination package\

          # Copier plugins Qt
          Copy-Item -Recurse build\src\app\Release\platforms package\ -ErrorAction SilentlyContinue
          Copy-Item -Recurse build\src\app\Release\styles package\ -ErrorAction SilentlyContinue

          # README utilisateur (optionnel mais propre)
          Set-Content package\README.txt "Run Fluvel.exe to start the application."

          # Création archive portable
          Compress-Archive -Path package\* -DestinationPath Fluvel-${{ env.VERSION }}-win64-portable.zip

      # Install Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup -y

      # Vérifier script installer
      - name: Check installer script
        shell: pwsh
        run: |
          if (!(Test-Path "packaging/windows/installer.iss")) {
            Write-Error "installer.iss not found"
            exit 1
          }

      # Build installer
      - name: Build installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} packaging/windows/installer.iss

      # Vérifier output installer
      - name: Check installer output
        shell: pwsh
        run: |
          dir packaging\windows\Output
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          if (!$exe) {
            Write-Error "Installer not found!"
            exit 1
          }

      # Rename installer proprement
      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "Fluvel-${{ env.VERSION }}-win64-installer.exe"

      # Copier installer à la racine
      - name: Move installer to root
        shell: pwsh
        run: |
          Copy-Item packaging\windows\Output\Fluvel-${{ env.VERSION }}-win64-installer.exe .

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluvel-windows-${{ env.VERSION }}
          path: |
            Fluvel-${{ env.VERSION }}-win64-portable.zip
            Fluvel-${{ env.VERSION }}-win64-installer.exe
