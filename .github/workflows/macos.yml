name: Fluvel macOS Release

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:
  macos:
    runs-on: macos-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Compute version (tag ou commit)
      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION = $VERSION"

      # Setup Qt
      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          host: 'mac'
          target: 'desktop'
          modules: 'qtmultimedia'

      # Configure
      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          -DFLUVEL_GIT_COMMIT=${{ github.sha }}
          -DFLUVEL_BUILD_ORIGIN="GitHub Actions"
          -DFLUVEL_VERSION=${{ env.VERSION }}

      # Build
      - name: Build
        run: cmake --build build --config Release

      - name: Check app
        run: ls build

      - name: Debug app tree
        run: ls -R build | head -50

      - name: Resolve app path
        run: |
          if [ -d "build/Fluvel.app" ]; then
            APP_PATH="build/Fluvel.app"
          elif [ -d "build/Release/Fluvel.app" ]; then
            APP_PATH="build/Release/Fluvel.app"
          else
            echo "❌ Fluvel.app not found"
            ls -R build
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Using $APP_PATH"

      - name: Check macdeployqt
        run: |
          if [ ! -x "${{ env.Qt6_DIR }}/../../../bin/macdeployqt" ]; then
            echo "❌ macdeployqt not found"
            exit 1
          fi

      # Deploy Qt
      - name: Deploy Qt
        run: |
          "${{ env.Qt6_DIR }}/../../../bin/macdeployqt" "${{ env.APP_PATH }}" -verbose=2

      - name: Create DMG
        run: |
          rm -rf dmg
          mkdir dmg
          cp -R "${{ env.APP_PATH }}" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create Fluvel-${{ env.VERSION }}-macos.dmg -volname Fluvel -srcfolder dmg -ov -format UDZO

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluvel-macos-${{ env.VERSION }}
          path: |
            Fluvel-${{ env.VERSION }}-macos.dmg
