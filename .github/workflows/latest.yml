name: Fluvel Latest

concurrency:
  group: fluvel-latest
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [release]

jobs:

  changes:
    runs-on: ubuntu-latest

    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      build: ${{ steps.filter.outputs.build }}
      web: ${{ steps.filter.outputs.web }}

    steps:

      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |

            docker:
              - 'docker/**'
              - '.github/workflows/build-linux.yml'

            build:
              - 'src/**'
              - 'resources/**'
              - 'packaging/**'
              - 'CMakeLists.txt'
              - '.github/workflows/build-desktop.yml'
              - '.github/workflows/build-linux.yml'

            web:
              - 'web/**'
              - 'assets/**'

  desktop:
    needs: changes
    if: needs.changes.outputs.build == 'true'

    uses: ./.github/workflows/build-desktop.yml
    secrets: inherit


  linux:
    needs: changes
    if: |
      needs.changes.outputs.build == 'true' ||
      needs.changes.outputs.docker == 'true'

    uses: ./.github/workflows/build-linux.yml
    secrets: inherit


  prepare:
    needs: [desktop, linux]

    if: |
      always() &&
      !contains(needs.*.result, 'failure')

    uses: ./.github/workflows/prepare-release.yml
    secrets: inherit


  release:
    needs: [prepare]

    if: |
      always() &&
      !contains(needs.*.result, 'failure')

    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: windows

      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: macos

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: prepared-release
          path: prepared

      - name: Update latest tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git tag -f latest ${{ github.sha }}
          git push origin latest --force

      - name: Install gh
        run: |
          command -v gh || (apt update && apt install -y gh)

      # =========================
      # CREATE OR UPDATE RELEASE
      # =========================
      - name: Ensure release exists and is published
        run: |
          if gh release view latest >/dev/null 2>&1; then
            echo "Release exists"

            gh release edit latest \
              --draft=false \
              --latest

          else
            echo "Creating release"

            gh release create latest \
              --title "Latest Development Build" \
              --notes "Auto release" \
              --target "${{ github.sha }}" \
              --latest \
              --draft=false
          fi

          gh release view latest --json isDraft,url

      # =========================
      # UPLOAD ASSETS (ATOMIC)
      # =========================
      - name: Upload assets
        run: |
          gh release upload latest \
            windows/Fluvel-win64-portable.zip \
            windows/Fluvel-win64-installer.exe \
            macos/Fluvel-macos.dmg \
            linux/Fluvel-linux.AppImage \
            linux/Fluvel-linux.flatpak \
            prepared/BUILD_INFO.txt \
            --clobber

  deploy:
    needs: [changes, release]
    if: |
      needs.changes.outputs.build == 'true' ||
      needs.changes.outputs.web == 'true'

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      # =========================
      # DOWNLOAD RELEASE METADATA
      # =========================

      - uses: actions/download-artifact@v4
        if: needs.changes.outputs.build == 'true'
        with:
          name: prepared-release
          path: prepared

      # =========================
      # DEPLOY GITHUB PAGES
      # =========================

      - name: Deploy GitHub Pages
        run: |

          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fbessy/fluvel.git gh-pages
          cd gh-pages

          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout -b gh-pages

          cp -r ../web/* .

          rm -rf media
          cp -r ../assets/videos ./media

          if [ "${{ needs.changes.outputs.build }}" = "true" ]; then
            cp ../prepared/latest.json .
          else
            echo "Keeping existing latest.json"
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git pull origin gh-pages || true

          git add .
          git commit -m "Update latest build" || true
          git push
