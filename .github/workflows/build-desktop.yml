name: Desktop Build (Windows + macOS)

on:
  workflow_call:

permissions:
  contents: read

jobs:

  # =========================
  # WINDOWS BUILD
  # =========================
  windows:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      # Clean (important)
      - name: Clean
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue

      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: C:/Users/runneradmin/Qt
          key: qt-windows-6.8.2

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Configure
        shell: bash
        run: |
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            \
            -DFLUVEL_BUILD_VERSION=${{ env.VERSION }} \
            -DFLUVEL_GIT_COMMIT=${{ github.sha }} \
            -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
            -DFLUVEL_BUILD_ORIGIN="GitHub Actions"


      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt
        shell: pwsh
        run: |
          & "${{ env.Qt6_DIR }}/bin/windeployqt.exe" `
            --release `
            --compiler-runtime `
            --no-translations `
            --no-system-d3d-compiler `
            build\src\app\Release\Fluvel.exe

      - name: Package
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue

          New-Item -ItemType Directory package | Out-Null

          Copy-Item build\src\app\Release\* package\ -Recurse

          Compress-Archive `
            -Path package\* `
            -DestinationPath Fluvel-win64-portable.zip `
            -Force

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Read project version
        shell: bash
        run: |
          PROJECT_VERSION=$(grep -Eo 'project\(.*VERSION[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | \
                            grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)

          echo "PROJECT_VERSION=$PROJECT_VERSION" >> $GITHUB_ENV

      - name: Build installer
        shell: pwsh
        run: |
          iscc `
            "/DMyAppVersion=$env:VERSION" `
            "/DMyVersionInfo=$env:PROJECT_VERSION.0" `
            packaging/windows/installer.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "Fluvel-win64-installer.exe"
          Copy-Item packaging\windows\Output\Fluvel-win64-installer.exe .

      - name: Generate checksum
        run: |
          Get-FileHash Fluvel-win64-portable.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  Fluvel-win64-portable.zip" } |
            Out-File Fluvel-win64-portable.zip.sha256 -Encoding ascii

          Get-FileHash Fluvel-win64-installer.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  Fluvel-win64-installer.exe" } |
            Out-File Fluvel-win64-installer.exe.sha256 -Encoding ascii

      - name: Generate commit info
        run: |
          Set-Content -Path commit-windows.txt -Value $env:GITHUB_SHA -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            Fluvel-win64-portable.zip
            Fluvel-win64-portable.zip.sha256
            Fluvel-win64-installer.exe
            Fluvel-win64-installer.exe.sha256
            commit-windows.txt


  # =========================
  # MACOS BUILD
  # =========================
  macos:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.9.2'
          host: 'mac'
          target: 'desktop'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            \
            -DFLUVEL_BUILD_VERSION=${{ env.VERSION }} \
            -DFLUVEL_GIT_COMMIT=${{ github.sha }} \
            -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
            -DFLUVEL_BUILD_ORIGIN="GitHub Actions"

      - name: Build
        run: cmake --build build --config Release

      - name: Find app
        run: |
          APP_PATH=$(find build -name "Fluvel.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Deploy Qt
        run: |
          "${{ env.Qt6_DIR }}/bin/macdeployqt" "${{ env.APP_PATH }}" -codesign=off

      - name: Create DMG
        run: |
          rm -rf dmg
          mkdir dmg
          cp -R "${{ env.APP_PATH }}" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create Fluvel-macos.dmg -volname Fluvel -srcfolder dmg -ov -format UDZO

      - name: Generate checksum
        run: |
          shasum -a 256 Fluvel-macos.dmg > Fluvel-macos.dmg.sha256

      - name: Generate commit info
        run: |
          echo "${GITHUB_SHA}" > commit-macos.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            Fluvel-macos.dmg
            Fluvel-macos.dmg.sha256
            commit-macos.txt
