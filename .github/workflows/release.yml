name: Fluvel Release

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          set -e

          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "Not a tag → skipping version check ✔"
            exit 0
          fi

          echo "Checking version consistency..."

          VERSION_IN_CODE=$(grep -Eo 'project\(.*VERSION[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | \
                            grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)

          TAG_VERSION=${GITHUB_REF_NAME#v}

          echo "CMake version: $VERSION_IN_CODE"
          echo "Tag version: $TAG_VERSION"

          if ! [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid tag format"
            exit 1
          fi

          if [[ "$VERSION_IN_CODE" != "$TAG_VERSION" ]]; then
            echo "ERROR: Version mismatch!"
            exit 1
          fi

          echo "Version check passed ✔"


  # =========================
  # WINDOWS BUILD
  # =========================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Clean (important)
      - name: Clean
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue

      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Cache Qt
        uses: actions/cache@v4
        with:
          path: C:/Users/runneradmin/Qt
          key: qt-windows-6.8.2

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Configure
        shell: bash
        run: |
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            \
            -DFLUVEL_BUILD_VERSION=${{ env.VERSION }} \
            -DFLUVEL_GIT_COMMIT=${{ github.sha }} \
            -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
            -DFLUVEL_BUILD_ORIGIN="GitHub Actions"


      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt
        shell: pwsh
        run: |
          & "${{ env.Qt6_DIR }}/bin/windeployqt.exe" `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            build\src\app\Release\Fluvel.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir package
          Copy-Item build\src\app\Release\Fluvel.exe package\ -ErrorAction Stop
          tar -a -c -f Fluvel-win64-portable.zip -C package .

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} packaging/windows/installer.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "Fluvel-win64-installer.exe"
          Copy-Item packaging\windows\Output\Fluvel-win64-installer.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            Fluvel-win64-portable.zip
            Fluvel-win64-installer.exe


  # =========================
  # MACOS BUILD
  # =========================
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            \
            -DFLUVEL_BUILD_VERSION=${{ env.VERSION }} \
            -DFLUVEL_GIT_COMMIT=${{ github.sha }} \
            -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
            -DFLUVEL_BUILD_ORIGIN="GitHub Actions"

      - name: Build
        run: cmake --build build --config Release

      - name: Find app
        run: |
          APP_PATH=$(find build -name "Fluvel.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Deploy Qt
        run: |
          "${{ env.Qt6_DIR }}/bin/macdeployqt" "${{ env.APP_PATH }}" -codesign=off

      - name: Create DMG
        run: |
          rm -rf dmg
          mkdir dmg
          cp -R "${{ env.APP_PATH }}" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create Fluvel-macos.dmg -volname Fluvel -srcfolder dmg -ov -format UDZO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Fluvel-macos.dmg

  docker-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect Docker changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'docker/qt-builder/**'

      - name: Login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Ensure image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/qt-builder:qt6.8.2

          EXISTS=false
          if docker manifest inspect $IMAGE > /dev/null 2>&1; then
            EXISTS=true
          fi

          echo "Image exists: $EXISTS"
          echo "Docker changed: ${{ steps.changes.outputs.docker }}"

          if [ "$EXISTS" = "false" ] || [ "${{ steps.changes.outputs.docker }}" = "true" ]; then
            echo "Building image..."
            docker build -t $IMAGE -f docker/qt-builder/Dockerfile .
            docker push $IMAGE
          else
            echo "Skipping build"
          fi

  # =========================
  # Linux Flatpak BUILD
  # =========================
  linux-flatpak:
    needs: docker-image
    runs-on: ubuntu-latest

    if: github.ref_type == 'tag' || github.ref_name == 'release'

    steps:
      - uses: actions/checkout@v4

      # 🧠 Compute version
      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}/qt-builder:qt6.8.2

      # 📦 Build Flatpak dans Docker
      - name: Build Flatpak
        run: |
          docker run --rm \
            --privileged \
            -v ${{ github.workspace }}:/workspace \
            ghcr.io/${{ github.repository }}/qt-builder:qt6.8.2 \
            bash -c "
              cd /workspace
              git config --global --add safe.directory /workspace
              echo \"Version = $APP_VERSION\"

              PROJECT_ROOT=\$(git rev-parse --show-toplevel)

              BUILD_TIMESTAMP=\$(date -u +\"%Y-%m-%d %H:%M:%S\" | sed 's/[\/&]/\\\\&/g')
              APP_DATE=\$(date +%Y-%m-%d)

              cp packaging/flatpak/fluvel.json fluvel.ci.json
              cp packaging/flatpak/org.fluvel.App.metainfo.xml metainfo.ci.xml

              ESCAPED_ROOT=\$(printf '%s\n' \"\$PROJECT_ROOT\" | sed 's/[\/&]/\\\\&/g')

              sed -i \"s|__SOURCE_ROOT__|\$ESCAPED_ROOT|g\" fluvel.ci.json
              sed -i \"s/__APP_VERSION__/$APP_VERSION/g\" fluvel.ci.json
              sed -i \"s/__CI_COMMIT__/$COMMIT_SHORT/g\" fluvel.ci.json
              sed -i \"s/__BUILD_TIMESTAMP__/\$BUILD_TIMESTAMP/g\" fluvel.ci.json
              sed -i \"s/__BUILD_ORIGIN__/GitHub Actions/g\" fluvel.ci.json

              sed -i \"s/__APP_VERSION__/$APP_VERSION/g\" metainfo.ci.xml
              sed -i \"s/__APP_DATE__/\$APP_DATE/g\" metainfo.ci.xml

              mkdir -p repo

              flatpak-builder --repo=repo --force-clean build-flatpak fluvel.ci.json
              flatpak build-export repo build-flatpak
              flatpak build-bundle repo Fluvel-linux.flatpak org.fluvel.App
            "

      # 📤 Upload artifact
      - uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: Fluvel-linux.flatpak

  # =========================
  # Linux AppImage BUILD
  # =========================
  linux-appimage:
    needs: docker-image
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/') || github.ref_name == 'release'

    steps:
      - uses: actions/checkout@v4

      # 🧠 Compute version
      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "COMMIT_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}/qt-builder:qt6.8.2

      # 📦 Build AppImage dans Docker
      - name: Build AppImage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ghcr.io/${{ github.repository }}/qt-builder:qt6.8.2 \
            bash -c "
              cd /workspace

              echo \"Version = $APP_VERSION\"

              unset LD_LIBRARY_PATH
              unset QT_PLUGIN_PATH
              unset QML2_IMPORT_PATH

              BUILD_TIMESTAMP=\$(date -u +\"%Y-%m-%d %H:%M:%S\")

              cmake --fresh -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_UNITY_BUILD=OFF \
                -DQt6_DIR=\$Qt6_DIR \
                -DFLUVEL_BUILD_VERSION=$APP_VERSION \
                -DFLUVEL_GIT_COMMIT=$COMMIT_SHORT \
                -DFLUVEL_BUILD_TIMESTAMP=\"\$BUILD_TIMESTAMP\" \
                -DFLUVEL_BUILD_ORIGIN=\"GitHub Actions\"

              cmake --build build

              mkdir -p AppDir
              cmake --install build --prefix AppDir/usr

              cp packaging/appimage/fluvel.desktop AppDir/
              cp packaging/appimage/fluvel.png AppDir/

              export QT_PLUGIN_PATH=\$QT_ROOT/plugins
              export LD_LIBRARY_PATH=\$QT_ROOT/lib:\$LD_LIBRARY_PATH
              export APPIMAGE_EXTRACT_AND_RUN=1

              # ⚠️ retirer libqtiff
              cp -r \$QT_ROOT/plugins qt-plugins
              rm -f qt-plugins/imageformats/libqtiff.so*

              export QT_PLUGIN_PATH=/workspace/qt-plugins

              /opt/tools/linuxdeploy.AppImage \
                --appdir AppDir \
                --executable AppDir/usr/bin/Fluvel \
                --desktop-file AppDir/fluvel.desktop \
                --icon-file AppDir/fluvel.png \
                --plugin qt \
                --output appimage

              mv *.AppImage Fluvel-linux.AppImage
            "

      # 📤 Upload artifact
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: Fluvel-linux.AppImage

  # =========================
  # RELEASE
  # =========================
  release:
    needs: [windows, macos, linux-appimage, linux-flatpak, check-version]
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: windows

      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: macos

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: linux-flatpak
          path: linux

      - name: Install gh
        run: |
          command -v gh || (apt update && apt install -y gh)

      - name: Debug files
        run: ls -R

      # =========================
      # CREATE RELEASE
      # =========================
      - name: Ensure release exists
        run: |
          gh release view latest || gh release create latest \
            -t "Latest Development Build" \
            -n "Auto release" \
            --target ${{ github.sha }}

      # =========================
      # UPLOAD WINDOWS + MACOS
      # =========================
      - name: Upload assets
        run: |
          gh release upload latest windows/Fluvel-win64-portable.zip --clobber
          gh release upload latest windows/Fluvel-win64-installer.exe --clobber
          gh release upload latest macos/Fluvel-macos.dmg --clobber
          gh release upload latest linux/Fluvel-linux.AppImage --clobber
          gh release upload latest linux/Fluvel-linux.flatpak --clobber

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compute checksums
        run: |
          BASE_SUMS=$(sha256sum windows/* macos/* linux/* 2>/dev/null | \
            sed ':a;N;$!ba;s/\n/\\n/g' || true)

          echo "ALL_CHECKSUMS=$BASE_SUMS" >> $GITHUB_ENV

      - name: Generate latest.json
        run: |
          COMMIT_SHORT=${GITHUB_SHA::8}
          BRANCH_NAME=${GITHUB_REF_NAME}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "branch": "$BRANCH_NAME",
            "commit": "$COMMIT_SHORT",
            "date": "$BUILD_DATE",

            "windows": {
              "installer": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-win64-installer.exe",
              "portable": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-win64-portable.zip"
            },

            "macos": {
              "dmg": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-macos.dmg"
            },

            "linux": {
              "appimage": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-linux.AppImage",
              "flatpak": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-linux.flatpak"
            },

            "checksums": "$ALL_CHECKSUMS"
          }
          EOF

      # =========================
      # DEPLOY GITHUB PAGES
      # =========================
      - name: Deploy GitHub Pages
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fbessy/fluvel.git gh-pages
          cd gh-pages

          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout -b gh-pages

          cp -r ../web/* .
          cp ../latest.json .

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git pull origin gh-pages || true

          git add .
          git commit -m "Update latest build" || true
          git push
