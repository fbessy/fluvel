name: Fluvel Release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:

  # =========================
  # WINDOWS BUILD
  # =========================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Clean (important)
      - name: Clean
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue

      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Configure
        shell: bash
        run: |
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            \
            -DFLUVEL_BUILD_VERSION=${{ env.VERSION }} \
            -DFLUVEL_GIT_COMMIT=${{ github.sha }} \
            -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
            -DFLUVEL_BUILD_ORIGIN="GitHub Actions"


      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        shell: pwsh
        run: |
          & "${{ env.Qt6_DIR }}/bin/windeployqt.exe" --release build\src\app\Release\Fluvel.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir package
          Copy-Item build\src\app\Release\Fluvel.exe package\
          Copy-Item build\src\app\Release\*.dll package\ -ErrorAction SilentlyContinue
          Copy-Item -Recurse build\src\app\Release\platforms package\
          Compress-Archive -Path package\* -DestinationPath Fluvel-win64-portable.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} packaging/windows/installer.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "Fluvel-win64-installer.exe"
          Copy-Item packaging\windows\Output\Fluvel-win64-installer.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            Fluvel-win64-portable.zip
            Fluvel-win64-installer.exe


  # =========================
  # MACOS BUILD
  # =========================
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_UNITY_BUILD=OFF \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
            \
            -DFLUVEL_BUILD_VERSION=${{ env.VERSION }} \
            -DFLUVEL_GIT_COMMIT=${{ github.sha }} \
            -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
            -DFLUVEL_BUILD_ORIGIN="GitHub Actions"

      - name: Build
        run: cmake --build build --config Release

      - name: Find app
        run: |
          APP_PATH=$(find build -name "Fluvel.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Deploy Qt
        run: |
          "${{ env.Qt6_DIR }}/bin/macdeployqt" "${{ env.APP_PATH }}" -codesign=off

      - name: Create DMG
        run: |
          rm -rf dmg
          mkdir dmg
          cp -R "${{ env.APP_PATH }}" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create Fluvel-macos.dmg -volname Fluvel -srcfolder dmg -ov -format UDZO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Fluvel-macos.dmg


  # =========================
  # RELEASE
  # =========================
  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: windows

      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: macos

      - name: Install gh
        run: |
          command -v gh || (apt update && apt install -y gh)

      - name: Debug files
        run: ls -R

      # =========================
      # CREATE RELEASE
      # =========================
      - name: Ensure release exists
        run: |
          gh release delete latest -y || true

          gh release create latest \
            -t "Latest Development Build" \
            -n "Auto release" \
            --target ${{ github.sha }}

      # =========================
      # UPLOAD WINDOWS + MACOS
      # =========================
      - name: Upload assets
        run: |
          gh release upload latest windows/Fluvel-win64-portable.zip --clobber
          gh release upload latest windows/Fluvel-win64-installer.exe --clobber
          gh release upload latest macos/Fluvel-macos.dmg --clobber

      # =========================
      # WAIT FOR LINUX
      # =========================
      - name: Wait for Linux assets
        run: |
          echo "Waiting for Linux artifacts..."

          for i in {1..90}; do

            echo "Attempt $i / 90"

            ASSETS=$(gh release view latest --json assets -q '.assets[].name' || true)

            echo "$ASSETS"

            if echo "$ASSETS" | grep -q "Fluvel-linux.AppImage" && \
              echo "$ASSETS" | grep -q "Fluvel-linux.flatpak"; then
              echo "Linux artifacts found ✔"
              exit 0
            fi

            echo "Not ready yet... retry in 20s"
            sleep 20
          done

          echo "❌ Timeout waiting for Linux artifacts"
          exit 1

      # =========================
      # DOWNLOAD LINUX FOR CHECKSUMS
      # =========================
      - name: Download Linux assets
        run: |
          gh release download latest -p "Fluvel-linux.*"

          echo "FILES DOWNLOADED:"
          ls -lh

          LINUX_SUMS=$(sha256sum Fluvel-linux.AppImage Fluvel-linux.flatpak | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "LINUX_SUMS=$LINUX_SUMS" >> $GITHUB_ENV

      # =========================
      # GENERATE JSON
      # =========================
      - name: Generate latest.json
        run: |
          VERSION="dev-${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF##*/v}"
          fi

          COMMIT_SHORT=${GITHUB_SHA::8}
          BRANCH_NAME=${GITHUB_REF_NAME}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BASE_SUMS=$(sha256sum windows/* macos/* 2>/dev/null | sed ':a;N;$!ba;s/\n/\\n/g' || true)

          ALL_CHECKSUMS="$BASE_SUMS"
          if [ -n "$LINUX_SUMS" ]; then
            ALL_CHECKSUMS="$ALL_CHECKSUMS\n$LINUX_SUMS"
          fi

          echo "VERSION=$VERSION"
          echo "CHECKSUMS=$ALL_CHECKSUMS"

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "branch": "$BRANCH_NAME",
            "commit": "$COMMIT_SHORT",
            "date": "$BUILD_DATE",

            "windows": {
              "installer": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-win64-installer.exe",
              "portable": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-win64-portable.zip"
            },

            "macos": {
              "dmg": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-macos.dmg"
            },

            "linux": {
              "appimage": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-linux.AppImage",
              "flatpak": "https://github.com/fbessy/fluvel/releases/latest/download/Fluvel-linux.flatpak"
            },

            "checksums": "$ALL_CHECKSUMS"
          }
          EOF

      # =========================
      # DEPLOY GITHUB PAGES
      # =========================
      - name: Deploy GitHub Pages
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/fbessy/fluvel.git gh-pages
          cd gh-pages

          git fetch origin gh-pages || true
          git checkout gh-pages || git checkout -b gh-pages

          cp -r ../web/* .
          cp ../latest.json .

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git pull origin gh-pages || true

          git add .
          git commit -m "Update latest build" || true
          git push
