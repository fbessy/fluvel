name: Fluvel Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:

  # =========================
  # WINDOWS BUILD
  # =========================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          -DFLUVEL_BUILD_VERSION=${{ env.VERSION }}

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        shell: pwsh
        run: |
          & "${{ env.Qt6_DIR }}/bin/windeployqt.exe" --release build\src\app\Release\Fluvel.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir package
          Copy-Item build\src\app\Release\Fluvel.exe package\
          Copy-Item build\src\app\Release\*.dll package\ -ErrorAction SilentlyContinue
          Copy-Item -Recurse build\src\app\Release\platforms package\
          Compress-Archive -Path package\* -DestinationPath Fluvel-win64-portable.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} packaging/windows/installer.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "Fluvel-win64-installer.exe"
          Copy-Item packaging\windows\Output\Fluvel-win64-installer.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            Fluvel-win64-portable.zip
            Fluvel-win64-installer.exe


  # =========================
  # MACOS BUILD
  # =========================
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Find app
        run: |
          APP_PATH=$(find build -name "Fluvel.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Deploy Qt
        run: |
          "${{ env.Qt6_DIR }}/bin/macdeployqt" "${{ env.APP_PATH }}" -codesign=off

      - name: Create DMG
        run: |
          mkdir dmg
          cp -R "${{ env.APP_PATH }}" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create Fluvel-macos.dmg -volname Fluvel -srcfolder dmg -ov -format UDZO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Fluvel-macos.dmg


  # =========================
  # RELEASE
  # =========================
  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Development Build
          prerelease: true
          files: |
            **/*.exe
            **/*.zip
            **/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
