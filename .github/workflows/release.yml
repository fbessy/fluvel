name: Fluvel Release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [release]
    tags: ['v*']

jobs:

  # =========================
  # WINDOWS BUILD
  # =========================
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Clean (important)
      - name: Clean
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue

      - name: Compute version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          -DFLUVEL_BUILD_VERSION=${{ env.VERSION }}

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        shell: pwsh
        run: |
          & "${{ env.Qt6_DIR }}/bin/windeployqt.exe" --release build\src\app\Release\Fluvel.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir package
          Copy-Item build\src\app\Release\Fluvel.exe package\
          Copy-Item build\src\app\Release\*.dll package\ -ErrorAction SilentlyContinue
          Copy-Item -Recurse build\src\app\Release\platforms package\
          Compress-Archive -Path package\* -DestinationPath Fluvel-win64-portable.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc /DMyAppVersion=${{ env.VERSION }} packaging/windows/installer.iss

      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem packaging\windows\Output\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "Fluvel-win64-installer.exe"
          Copy-Item packaging\windows\Output\Fluvel-win64-installer.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            Fluvel-win64-portable.zip
            Fluvel-win64-installer.exe


  # =========================
  # MACOS BUILD
  # =========================
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.2'
          host: 'mac'
          target: 'desktop'
          modules: 'qtmultimedia'

      - name: Configure
        run: >
          cmake -B build -S .
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Find app
        run: |
          APP_PATH=$(find build -name "Fluvel.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Deploy Qt
        run: |
          "${{ env.Qt6_DIR }}/bin/macdeployqt" "${{ env.APP_PATH }}" -codesign=off

      - name: Create DMG
        run: |
          rm -rf dmg
          mkdir dmg
          cp -R "${{ env.APP_PATH }}" dmg/
          ln -s /Applications dmg/Applications
          hdiutil create Fluvel-macos.dmg -volname Fluvel -srcfolder dmg -ov -format UDZO

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Fluvel-macos.dmg


  # =========================
  # RELEASE
  # =========================
  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Debug files
        run: ls -R

      # 🔥 Nettoyage ciblé (Windows + macOS uniquement)
      - name: Remove old Windows/macOS assets
        continue-on-error: true
        run: |
          gh release view latest --json assets -q '.assets[].name' | while read asset; do
            if [[ "$asset" == *win64* ]] || [[ "$asset" == *macos* ]]; then
              echo "Deleting $asset"
              gh release delete-asset latest "$asset" -y
            else
              echo "Keeping $asset"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🧠 Crée la release si elle n'existe pas
      - name: Ensure release exists
        run: |
          gh release view latest || gh release create latest -t "Latest Development Build" -n "Auto release" --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🚀 Upload direct (sans softprops)
      - name: Upload assets
        run: |
          gh release upload latest windows/Fluvel-win64-portable.zip --clobber
          gh release upload latest windows/Fluvel-win64-installer.exe --clobber
          gh release upload latest macos/Fluvel-macos.dmg --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
