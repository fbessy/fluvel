stages:
  - docker
  - build
  - doc
  - pages

variables:
  QT_VERSION: "6.9.1"
  QT_ARCH: "gcc_64"

# =========================
# DOCKER IMAGE BUILD
# =========================
docker-build:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  script:
    - echo "Login to GitLab registry"
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    - IMAGE="$CI_REGISTRY_IMAGE/qt-builder:qt6.9.1"

    - echo "Building Docker image..."
    - export DOCKER_BUILDKIT=1

    # ⚠️ volontairement SANS cache pour stabilité
    - docker build \
        -t $IMAGE \
        -f docker/qt-builder/Dockerfile \
        .

    - echo "Pushing Docker image..."
    - docker push $IMAGE

    - echo "Docker build done"

  rules:
    - if: '$CI_COMMIT_BRANCH != "release" && $CI_COMMIT_TAG == null'

# =========================
# BUILD APPLICATION
# =========================
build:
  stage: build
  image: $CI_REGISTRY_IMAGE/qt-builder:qt6.9.1
  needs: ["docker-build"]

  cache:
    key: build-cache
    paths:
      - .ccache

  before_script:
    - export CCACHE_DIR="$CI_PROJECT_DIR/.ccache"

    # Debug utile (tu peux enlever plus tard)
    - which g++ || true
    - g++ --version || true
    - ccache -s || true

  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=${CI_COMMIT_TAG#v}
      else
        APP_VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "Version = $APP_VERSION"

      BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

      cmake --fresh -S . -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_UNITY_BUILD=OFF \
        -DQt6_DIR=$Qt6_DIR \
        -DFLUVEL_BUILD_VERSION=$APP_VERSION \
        -DFLUVEL_GIT_COMMIT=$CI_COMMIT_SHORT_SHA \
        -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
        -DFLUVEL_BUILD_ORIGIN="GitLab CI"

      cmake --build build

  rules:
    - if: '$CI_COMMIT_BRANCH != "release" && $CI_COMMIT_TAG == null'
      changes:
        - src/**/*
        - resources/**/*
        - CMakeLists.txt
        - .gitlab-ci.yml

# =========================
# DOCUMENTATION
# =========================
.doc_rules: &doc_rules
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'

doc:
  stage: doc
  image: ubuntu:24.04
  <<: *doc_rules

  before_script:
    - apt update
    - apt install -y doxygen graphviz

  script:
    - doxygen Doxyfile
    - mv docs/html public

  artifacts:
    paths:
      - public

# =========================
# GITLAB PAGES
# =========================
pages:
  stage: pages
  dependencies:
    - doc
  <<: *doc_rules

  script:
    - echo "Deploying GitLab Pages"

  artifacts:
    paths:
      - public
