stages:
  - verify
  - docker
  - build
  - package
  - doc
  - pages

variables:
  QT_VERSION: "6.9.1"
  QT_ARCH: "gcc_64"

check_version:
  stage: verify
  image: ubuntu:24.04
  script:
    - |
      echo "Checking version consistency..."

      VERSION_IN_CODE=$(grep "project(" CMakeLists.txt | sed -E 's/.*VERSION[[:space:]]+([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
      TAG_VERSION=${CI_COMMIT_TAG#v}

      echo "CMake version: $VERSION_IN_CODE"
      echo "Tag version: $TAG_VERSION"

      echo "$CI_COMMIT_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' || { echo "ERROR: Invalid tag format"; exit 1; }

      [ "$VERSION_IN_CODE" = "$TAG_VERSION" ] || { echo "ERROR: Version mismatch!"; exit 1; }
  rules:
    - if: '$CI_COMMIT_TAG'

docker-build:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    # cache précédent
    - docker pull $CI_REGISTRY_IMAGE/qt-builder:latest || true

    # build optimisé
    - |
      docker build \
        --cache-from $CI_REGISTRY_IMAGE/qt-builder:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t $CI_REGISTRY_IMAGE/qt-builder:latest \
        -f docker/qt-builder/Dockerfile \
        .

    - docker push $CI_REGISTRY_IMAGE/qt-builder:latest

build:
  stage: build
  image: $CI_REGISTRY_IMAGE/qt-builder

  cache:
    key: build-cache
    paths:
      - .ccache

  before_script:
    - export CCACHE_DIR="$CI_PROJECT_DIR/.ccache"
    - export CC="ccache gcc"
    - export CXX="ccache g++"

  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=${CI_COMMIT_TAG#v}
      else
        APP_VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "Version = $APP_VERSION"

      BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

      cmake --fresh -S . -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_UNITY_BUILD=OFF \
        -DQt6_DIR=$Qt6_DIR \
        -DFLUVEL_BUILD_VERSION=$APP_VERSION \
        -DFLUVEL_GIT_COMMIT=$CI_COMMIT_SHORT_SHA \
        -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
        -DFLUVEL_BUILD_ORIGIN="GitLab CI"

      cmake --build build

  rules:
    - if: '$CI_COMMIT_BRANCH != "release" && $CI_COMMIT_TAG == null'
      changes:
        - src/**/*
        - resources/**/*
        - CMakeLists.txt
        - .gitlab-ci.yml

flatpak:
  stage: package
  image: $CI_REGISTRY_IMAGE/qt-builder

  cache: {}

  before_script:
    - apt update
    - apt install -y flatpak flatpak-builder
    - flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
    - flatpak install -y flathub org.kde.Platform//6.9
    - flatpak install -y flathub org.kde.Sdk//6.9

  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=${CI_COMMIT_TAG#v}
      else
        APP_VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "Version = $APP_VERSION"

      PROJECT_ROOT=$(git rev-parse --show-toplevel)

      BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S" | sed 's/[\/&]/\\&/g')
      APP_DATE=$(date +%Y-%m-%d)

      cp packaging/flatpak/fluvel.json fluvel.ci.json
      cp packaging/flatpak/org.fluvel.App.metainfo.xml metainfo.ci.xml

      ESCAPED_ROOT=$(printf '%s\n' "$PROJECT_ROOT" | sed 's/[\/&]/\\&/g')

      sed -i "s|__SOURCE_ROOT__|$ESCAPED_ROOT|g" fluvel.ci.json
      sed -i "s/__APP_VERSION__/$APP_VERSION/g" fluvel.ci.json
      sed -i "s/__CI_COMMIT__/$CI_COMMIT_SHORT_SHA/g" fluvel.ci.json
      sed -i "s/__BUILD_TIMESTAMP__/$BUILD_TIMESTAMP/g" fluvel.ci.json
      sed -i "s/__BUILD_ORIGIN__/GitLab CI/g" fluvel.ci.json

      sed -i "s/__APP_VERSION__/$APP_VERSION/g" metainfo.ci.xml
      sed -i "s/__APP_DATE__/$APP_DATE/g" metainfo.ci.xml

      flatpak-builder --force-clean build-flatpak fluvel.ci.json
      flatpak build-export repo build-flatpak
      flatpak build-bundle repo Fluvel-linux.flatpak org.fluvel.App

  artifacts:
    paths:
      - Fluvel-linux.flatpak

  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'

appimage:
  stage: package
  image: $CI_REGISTRY_IMAGE/qt-builder

  cache: {}

  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=${CI_COMMIT_TAG#v}
      else
        APP_VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "Version = $APP_VERSION"

      unset LD_LIBRARY_PATH
      unset QT_PLUGIN_PATH
      unset QML2_IMPORT_PATH

      BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")
      echo "BUILD_TIMESTAMP=$BUILD_TIMESTAMP"

      cmake --fresh -S . -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_UNITY_BUILD=OFF \
        -DQt6_DIR=$Qt6_DIR \
        \
        -DFLUVEL_BUILD_VERSION=$APP_VERSION \
        -DFLUVEL_GIT_COMMIT=$CI_COMMIT_SHORT_SHA \
        -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
        -DFLUVEL_BUILD_ORIGIN="GitLab CI"

      cmake --build build

      mkdir -p AppDir
      cmake --install build --prefix AppDir/usr

      cp packaging/appimage/fluvel.desktop AppDir/
      cp packaging/appimage/fluvel.png AppDir/

      mkdir -p qt-plugins
      rsync -a "$QT_ROOT/plugins/" qt-plugins/ --exclude "imageformats/libqtiff.so*"

      export QT_PLUGIN_PATH="$CI_PROJECT_DIR/qt-plugins"
      export LD_LIBRARY_PATH="$QT_ROOT/lib:$LD_LIBRARY_PATH"
      export APPIMAGE_EXTRACT_AND_RUN=1

      /opt/tools/linuxdeploy \
        --appdir AppDir \
        --executable AppDir/usr/bin/Fluvel \
        --desktop-file AppDir/fluvel.desktop \
        --icon-file AppDir/fluvel.png \
        --plugin qt \
        --output appimage

      mv *.AppImage Fluvel-linux.AppImage

  artifacts:
    paths:
      - Fluvel-linux.AppImage

  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'

.doc_rules: &doc_rules
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'
      changes:
        - src/**/*
        - docs/images/**/*
        - Doxyfile
        - README.md
        - .gitlab-ci.yml

doc:
  stage: doc
  image: ubuntu:24.04
  <<: *doc_rules

  before_script:
    - apt update
    - apt install -y doxygen graphviz

  script:
    - doxygen Doxyfile
    - mv docs/html public

  artifacts:
    paths:
      - public

pages:
  stage: pages
  dependencies:
    - doc
  <<: *doc_rules

  script:
    - echo "Deploying GitLab Pages"

  artifacts:
    paths:
      - public

github_pages:
  stage: package
  image: ubuntu:24.04

  needs:
    - job: flatpak
      artifacts: true
    - job: appimage
      artifacts: true

  before_script:
    - apt update
    - apt install -y git gh jq curl

  script:
    - |
      set -e

      echo "=== VERSION ==="

      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=${CI_COMMIT_TAG#v}
      else
        APP_VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "Version = $APP_VERSION"

      echo "=== AUTH ==="

      unset GITHUB_TOKEN
      echo "$GITHUB_RELEASE_TOKEN" | gh auth login --with-token
      export GH_REPO=fbessy/fluvel

      gh auth status

      echo "=== CHECK RELEASE ==="
      gh release view latest

      echo "=== FILES ==="
      ls -lh

      [ -f Fluvel-linux.AppImage ] || { echo "❌ Missing AppImage"; exit 1; }
      [ -f Fluvel-linux.flatpak ] || { echo "❌ Missing Flatpak"; exit 1; }

      echo "=== UPLOAD ==="

      gh release upload latest Fluvel-linux.AppImage --clobber
      gh release upload latest Fluvel-linux.flatpak --clobber

  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'
