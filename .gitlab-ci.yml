stages:
  - build
  - doc

build:
  stage: build
  image: ubuntu:24.04

  cache:
    key: qt-cache
    paths:
      - $HOME/Qt

  before_script:
    - apt update
    - apt install -y python3-pip cmake ninja-build build-essential clang libgl1-mesa-dev

    - pip install aqtinstall

    # Installer Qt seulement si absent
    - |
      if [ ! -d "$HOME/Qt/6.10.2" ]; then
        aqt install-qt linux desktop 6.10.2 gcc_64
      fi

    - export QT_ROOT="$HOME/Qt/6.10.2/gcc_64"
    - export PATH="$QT_ROOT/bin:$PATH"
    - export CMAKE_PREFIX_PATH="$QT_ROOT/lib/cmake"

doc:
  stage: doc
  image: ubuntu:24.04
  before_script:
    - apt update
    - apt install -y doxygen graphviz
  script:
    - doxygen docs/Doxyfile
    - mv docs/html public
  artifacts:
    paths:
      - public
  only:
    - master
