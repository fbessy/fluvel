stages:
  - doc
  - pages

# =========================
# DOCUMENTATION
# =========================

.doc_rules: &doc_rules
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'

doc:
  stage: doc
  image: ubuntu:24.04

  <<: *doc_rules

  before_script:
    - apt update -y

    - apt install -y
        python3
        python3-pip
        python3-venv
        doxygen
        graphviz

  script:

    # -------------------------
    # Python virtual environment
    # -------------------------

    - python3 -m venv .venv

    - source .venv/bin/activate

    # -------------------------
    # Python dependencies
    # -------------------------

    - pip install --upgrade pip

    - pip install
        sphinx==7.4.7
        pydata-sphinx-theme==0.15.4
        breathe==4.36.0
        myst-parser==3.0.1
        sphinx-design==0.6.1
        docutils==0.21.2

    # -------------------------
    # Clean previous build
    # -------------------------

    - rm -rf docs/xml
    - rm -rf public

    # -------------------------
    # Prepare README
    # -------------------------

    - cp README.md docs/sphinx/source/README.md

    # -------------------------
    # Generate Doxygen XML/HTML
    # -------------------------

    - doxygen docs/doxygen/Doxyfile

    # -------------------------
    # Build Sphinx HTML
    # -------------------------

    - |
      sphinx-build \
        -E \
        -a \
        -b html \
        docs/sphinx/source \
        public

    - mkdir -p public/assets/videos
    - cp assets/videos/*.webm public/assets/videos/

    - mkdir -p public/assets/logo
    - cp assets/logo/fluvel.svg public/assets/logo/

  artifacts:
    paths:
      - public

# =========================
# GITLAB PAGES
# =========================

pages:
  stage: pages

  dependencies:
    - doc

  <<: *doc_rules

  script:
    - echo "Deploying GitLab Pages"

  artifacts:
    paths:
      - public
