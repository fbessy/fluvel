stages:
  - build
  - doc

variables:
  QT_VERSION: "6.7.2"

build:
  stage: build
  image: ubuntu:24.04

  cache:
    key: qt-cache
    paths:
      - $HOME/Qt

  before_script:
    - apt update
    - apt install -y python3-pip cmake ninja-build build-essential clang libgl1-mesa-dev

    - pip install aqtinstall --break-system-packages

    # debug utile
    - python3 -m aqt list-qt linux desktop --arch $QT_VERSION

    # Installer Qt seulement si absent
    - |
      if [ ! -d "$HOME/Qt/$QT_VERSION" ]; then
        python3 -m aqt install-qt linux desktop $QT_VERSION linux_gcc_64 -O $HOME/Qt
      fi

    - export QT_ROOT="$HOME/Qt/$QT_VERSION/linux_gcc_64"
    - export PATH="$QT_ROOT/bin:$PATH"
    - export CMAKE_PREFIX_PATH="$QT_ROOT/lib/cmake"

  script:
    - cmake -S . -B build -G Ninja
    - cmake --build build

doc:
  stage: doc
  image: ubuntu:24.04
  before_script:
    - apt update
    - apt install -y doxygen graphviz
  script:
    - doxygen docs/Doxyfile
    - mv docs/html public
  artifacts:
    paths:
      - public
  only:
    - master
