stages:
  - docker
  - build
  - package
  - doc
  - pages

variables:
  QT_VERSION: "6.9.1"
  QT_ARCH: "gcc_64"

docker-build:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    # cache précédent
    - docker pull $CI_REGISTRY_IMAGE/qt-builder:latest || true

    # build optimisé
    - |
      docker build \
        --cache-from $CI_REGISTRY_IMAGE/qt-builder:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t $CI_REGISTRY_IMAGE/qt-builder:latest \
        -f docker/qt-builder/Dockerfile \
        .

    - docker push $CI_REGISTRY_IMAGE/qt-builder:latest

build:
  stage: build
  image: $CI_REGISTRY_IMAGE/qt-builder

  cache:
    key: build-cache
    paths:
      - .ccache

  before_script:
    - export CCACHE_DIR="$CI_PROJECT_DIR/.ccache"
    - export CC="ccache gcc"
    - export CXX="ccache g++"

  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        APP_VERSION=${CI_COMMIT_TAG#v}
      else
        APP_VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      fi

      echo "Version = $APP_VERSION"

      BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")

      cmake --fresh -S . -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_UNITY_BUILD=OFF \
        -DQt6_DIR=$Qt6_DIR \
        -DFLUVEL_BUILD_VERSION=$APP_VERSION \
        -DFLUVEL_GIT_COMMIT=$CI_COMMIT_SHORT_SHA \
        -DFLUVEL_BUILD_TIMESTAMP="$BUILD_TIMESTAMP" \
        -DFLUVEL_BUILD_ORIGIN="GitLab CI"

      cmake --build build

  rules:
    - if: '$CI_COMMIT_BRANCH != "release" && $CI_COMMIT_TAG == null'
      changes:
        - src/**/*
        - resources/**/*
        - CMakeLists.txt
        - .gitlab-ci.yml

.doc_rules: &doc_rules
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'
      changes:
        - src/**/*
        - docs/images/**/*
        - Doxyfile
        - README.md
        - .gitlab-ci.yml

doc:
  stage: doc
  image: ubuntu:24.04
  <<: *doc_rules

  before_script:
    - apt update
    - apt install -y doxygen graphviz

  script:
    - doxygen Doxyfile
    - mv docs/html public

  artifacts:
    paths:
      - public

pages:
  stage: pages
  dependencies:
    - doc
  <<: *doc_rules

  script:
    - echo "Deploying GitLab Pages"

  artifacts:
    paths:
      - public


trigger_github:
  stage: package
  image: ubuntu:24.04

  script:
    - apt update && apt install -y curl

    - |
      curl -X POST \
        -H "Authorization: Bearer $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/fbessy/fluvel/dispatches \
        -d '{"event_type":"fluvel-release"}'

  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'
