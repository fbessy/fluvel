stages:
  - doc
  - pages

# =========================
# DOCUMENTATION
# =========================
.doc_rules: &doc_rules
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "release"'

doc:
  stage: doc
  image: ubuntu:24.04
  <<: *doc_rules

  before_script:
    - apt update -y
    - apt install -y doxygen graphviz

  script:
    - doxygen Doxyfile
    - mkdir -p public
    - mv docs/html/* public/

  artifacts:
    paths:
      - public

# =========================
# GITLAB PAGES
# =========================
pages:
  stage: pages
  dependencies:
    - doc
  <<: *doc_rules

  script:
    - echo "Deploying GitLab Pages"

  artifacts:
    paths:
      - public
