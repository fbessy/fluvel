<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="violetGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8a6cff"/>
    <stop offset="100%" stop-color="#7c5cff"/>
</linearGradient>

<linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#57e6a8"/>
    <stop offset="100%" stop-color="#34c759"/>
</linearGradient>

<!-- pixel violet -->
<g id="pv">
<rect width="5" height="5" rx="0.8" fill="url(#violetGrad)"></rect>
<rect width="5" height="1" fill="#ffffff" opacity="0.15"></rect>
<rect y="4" width="5" height="1" fill="#000000" opacity="0.12"></rect>
</g>

<!-- pixel vert -->
<g id="pg">
<rect width="5" height="5" rx="0.8" fill="url(#greenGrad)"></rect>
<rect width="5" height="1" fill="#ffffff" opacity="0.12"></rect>
<rect y="4" width="5" height="1" fill="#000000" opacity="0.10"></rect>
</g>

</defs>

<!-- F pixel -->
<g transform="scale(21.3333333333)">
    <g transform="translate(6,0)">

<!-- ligne 1 -->
<use href="#pv" x="0" y="0"></use>
<use href="#pv" x="6" y="0"></use>
<use href="#pv" x="12" y="0"></use>
<use href="#pv" x="18" y="0"></use>
<use href="#pv" x="24" y="0"></use>
<use href="#pv" x="30" y="0"></use>

<!-- ligne 2 -->
<use href="#pv" x="0" y="6"></use>
<use href="#pg" x="6" y="6"></use>
<use href="#pg" x="12" y="6"></use>
<use href="#pg" x="18" y="6"></use>
<use href="#pg" x="24" y="6"></use>
<use href="#pv" x="30" y="6"></use>

<!-- ligne 3 -->
<use href="#pv" x="0" y="12"></use>
<use href="#pg" x="6" y="12"></use>

<!-- ligne 4 -->
<use href="#pv" x="0" y="18"></use>
<use href="#pg" x="6" y="18"></use>
<use href="#pg" x="12" y="18"></use>
<use href="#pv" x="18" y="18"></use>

<!-- ligne 5 -->
<use href="#pv" x="0" y="24"></use>
<use href="#pg" x="6" y="24"></use>
<use href="#pg" x="12" y="24"></use>
<use href="#pv" x="18" y="24"></use>

<!-- ligne 6 -->
<use href="#pv" x="0" y="30"></use>
<use href="#pg" x="6" y="30"></use>

<!-- ligne 7 -->
<use href="#pv" x="0" y="36"></use>
<use href="#pg" x="6" y="36"></use>

<!-- ligne 8 -->
<use href="#pv" x="0" y="42"></use>
<use href="#pv" x="6" y="42"></use>

</g>
</g>

</svg>
