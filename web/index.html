<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluvel Downloads</title>
<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
h1 { color: #333; }
.section {
  border: 1px solid #ddd;
  padding: 15px;
  margin: 15px 0;
  border-radius: 8px;
}
a.button {
  display: inline-block;
  padding: 10px 15px;
  margin: 5px;
  background: #007acc;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}
pre {
  background: #f5f5f5;
  padding: 10px;
}
</style>
</head>
<body>

<h1>Fluvel Downloads</h1>

<div class="section">
<h2>Latest Release Candidate</h2>

<p><b>Version:</b> <span id="version">loading...</span></p>

<h3>Downloads</h3>

<a id="appimage" class="button">AppImage</a>
<a id="flatpak" class="button">Flatpak</a>
<a id="windows" class="button">Windows</a>
<a id="macos" class="button">macOS</a>

<h3>Checksums</h3>
<pre id="checksums">loading...</pre>

</div>

<script>
fetch("latest.json")
.then(r => r.json())
.then(data => {
  document.getElementById("version").innerText = data.version;
  document.getElementById("appimage").href = data.appimage;
  document.getElementById("flatpak").href = data.flatpak;
  document.getElementById("windows").href = data.windows;
  document.getElementById("macos").href = data.macos;
  document.getElementById("checksums").innerText = data.checksums;
});
</script>

</body>
</html>
