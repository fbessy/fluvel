<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 28px;
  color: #333;
}

.title img {
  width: 42px;
  height: 42px;
  filter: drop-shadow(0 0 2px rgba(0,0,0,0.2));
  transition: transform 0.2s ease, filter 0.2s ease;
}

.title img:hover {
  transform: scale(1.08);
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.35));
}

.section {
  border: 1px solid #ddd;
  padding: 15px;
  margin: 15px 0;
  border-radius: 8px;
}

.platform {
  margin-top: 20px;
}

.platform h3 {
  margin-bottom: 5px;
}

a.button {
  display: inline-block;
  padding: 10px 15px;
  margin: 5px 5px 5px 0;
  background: #007acc;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

pre {
  background: #f5f5f5;
  padding: 10px;
  overflow-x: auto;
}

code {
  background: #eee;
  padding: 2px 6px;
  border-radius: 4px;
}
</style>

</head>

<body>

<h1 class="title">
  <img src="fluvel.svg" alt="Fluvel logo">
  <span>Fluvel Downloads</span>
</h1>

<div class="section">
  <h2>Latest Build</h2>

  <p><b>Version:</b> <span id="version">loading...</span></p>
  <p><b>Branch:</b> <span id="branch">loading...</span></p>
  <p><b>Commit:</b> <code id="commit">loading...</code></p>
  <p><b>Build date (UTC):</b> <span id="date">loading...</span></p>

  <div class="platform" id="platform_windows">
    <h3>🪟 Windows</h3>
    <a id="win_installer" class="button">Installer (.exe)</a>
    <a id="win_portable" class="button">Portable (.zip)</a>
  </div>

  <div class="platform" id="platform_linux">
    <h3>🐧 Linux</h3>
    <a id="flatpak" class="button">Flatpak (recommended)</a>
    <a id="appimage" class="button">AppImage</a>
  </div>

  <div class="platform" id="platform_macos">
    <h3>🍎 macOS</h3>
    <a id="macos" class="button">DMG</a>
  </div>

  <h3>Checksums (SHA-256)</h3>
  <pre id="checksums">loading...</pre>

</div>

<script>
function setLink(id, url) {
  const el = document.getElementById(id);
  if (!url || url === "") {
    el.style.display = "none";
    return false;
  }
  el.href = url;
  el.target = "_blank";
  return true;
}

function hidePlatformIfEmpty(platformId, linkIds) {
  const hasVisible = linkIds.some(id => {
    const el = document.getElementById(id);
    return el && el.style.display !== "none";
  });

  if (!hasVisible) {
    document.getElementById(platformId).style.display = "none";
  }
}

fetch("latest.json")
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(data => {

    document.getElementById("version").innerText = data.version || "N/A";
    document.getElementById("branch").innerText = data.branch || "N/A";
    document.getElementById("commit").innerText = data.commit || "N/A";

    if (data.date) {
      const d = new Date(data.date);
      document.getElementById("date").innerText =
        d.toLocaleString("en-GB", {
          year: "numeric",
          month: "long",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          timeZone: "UTC"
        }) + " UTC";
    } else {
      document.getElementById("date").innerText = "N/A";
    }

    setLink("win_installer", data.windows?.installer);
    setLink("win_portable", data.windows?.portable);

    setLink("flatpak", data.linux?.flatpak);
    setLink("appimage", data.linux?.appimage);

    setLink("macos", data.macos?.dmg);

    hidePlatformIfEmpty("platform_windows", ["win_installer", "win_portable"]);
    hidePlatformIfEmpty("platform_linux", ["flatpak", "appimage"]);
    hidePlatformIfEmpty("platform_macos", ["macos"]);

    document.getElementById("checksums").innerText =
      data.checksums || "No checksums available";

  })
  .catch(err => {
    console.error(err);
    document.getElementById("version").innerText = "Error loading data";
    document.getElementById("date").innerText = "-";
  });
</script>

</body>
</html>
